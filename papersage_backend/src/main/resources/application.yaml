spring:
  application:
    name: papersage_backend
  config:
    import: optional:classpath:secrets.properties
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"
  embedding:
    max-concurrency: 4
    max-attempts: 2
    initial-backoff-millis: 500
    completion-timeout-seconds: 30
